<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>СУРЛАГИЙН УДИРДЛАГЫН СИСТЕМ | Ирц + Тэмдэглэл + Хуваарь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Auth Container */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .auth-card:hover {
            transform: translateY(-5px);
        }

        .auth-card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .auth-card input, .auth-card select {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
            outline: none;
        }

        .auth-card input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .auth-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            cursor: pointer;
        }

        /* Main App Container */
        .app-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.5em;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .date-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .date-selector input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.9em;
        }

        .logout-btn {
            padding: 8px 20px;
            background: #f56565;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245,101,101,0.3);
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 25px;
            background: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Content Panels */
        .panel {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .panel.active {
            display: block;
        }

        /* Statistics Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        /* Attendance Table */
        .attendance-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .attendance-table th,
        .attendance-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .attendance-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .attendance-table tr:hover {
            background: #f8f9ff;
        }

        .status-btn {
            padding: 6px 12px;
            margin: 0 3px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85em;
        }

        .status-present {
            background: #48bb78;
            color: white;
        }

        .status-absent {
            background: #f56565;
            color: white;
        }

        .status-late {
            background: #ed8936;
            color: white;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        /* Notes Section */
        .notes-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .add-note {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .add-note input,
        .add-note textarea {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
        }

        .add-note button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .note-item {
            background: #f8f9ff;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .note-item:hover {
            transform: translateX(5px);
        }

        /* Schedule Section */
        .schedule-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .week-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .week-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .week-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
        }

        .schedule-table th,
        .schedule-table td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            text-align: left;
        }

        .schedule-table th {
            background: #667eea;
            color: white;
        }

        .schedule-table textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
        }

        /* Student Management */
        .student-list {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .attendance-table,
            .schedule-table {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <!-- Login/Register Container -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h2 id="authTitle">Нэвтрэх</h2>
            <input type="text" id="loginUsername" placeholder="Хэрэглэгчийн нэр">
            <input type="password" id="loginPassword" placeholder="Нууц үг">
            <select id="loginRole">
                <option value="student">Суралцагч</option>
                <option value="teacher">Багш</option>
            </select>
            <button onclick="login()">Нэвтрэх</button>
            <div class="toggle-auth" onclick="toggleAuth()">Бүртгүүлэх</div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="app-container">
        <div class="header">
            <h1>📚 СУРЛАГИЙН УДИРДЛАГЫН СИСТЕМ</h1>
            <div class="user-info">
                <div class="date-selector">
                    <input type="date" id="attendanceDate" onchange="loadAttendance()">
                </div>
                <span id="userNameDisplay"></span>
                <button class="logout-btn" onclick="logout()">Гарах</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="attendance">✅ Ирцийн Бүртгэл</button>
            <button class="nav-tab" data-tab="notes">📝 Миний Тэмдэглэл</button>
            <button class="nav-tab" data-tab="schedule">📅 Хичээлийн Хуваарь</button>
            <button class="nav-tab teacher-only" data-tab="manage" style="display:none;">👥 Суралцагчдын Удирдлага</button>
        </div>

        <!-- Attendance Panel -->
        <div id="attendancePanel" class="panel active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalStudents">0</div>
                    <div class="stat-label">Нийт суралцагч</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="presentCount">0</div>
                    <div class="stat-label">Ирсэн</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="absentCount">0</div>
                    <div class="stat-label">Ирээгүй</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="lateCount">0</div>
                    <div class="stat-label">Хоцорсон</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="attendanceRate">0%</div>
                    <div class="stat-label">Ирцийн түвшин</div>
                </div>
            </div>

            <div class="attendance-container">
                <h3>📊 Өдрийн ирцийн бүртгэл</h3>
                <table class="attendance-table" id="attendanceTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Овог</th>
                            <th>Нэр</th>
                            <th>Бүртгэлийн дугаар</th>
                            <th>Ирцийн төлөв</th>
                            <th>Үйлдэл</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Notes Panel -->
        <div id="notesPanel" class="panel">
            <div class="notes-container">
                <h3>📝 Миний Тэмдэглэлүүд</h3>
                <div class="add-note">
                    <input type="text" id="noteTitle" placeholder="Гарчиг">
                    <textarea id="noteContent" rows="2" placeholder="Тэмдэглэлээ бичнэ үү..."></textarea>
                    <button onclick="addNote()">➕ Нэмэх</button>
                </div>
                <div id="notesList"></div>
            </div>
        </div>

        <!-- Schedule Panel -->
        <div id="schedulePanel" class="panel">
            <div class="schedule-container">
                <h3>📅 Хичээлийн Хуваарь</h3>
                <div class="week-selector" id="weekSelector"></div>
                <table class="schedule-table">
                    <thead>
                        <tr>
                            <th>Цаг</th>
                            <th>Даваа</th>
                            <th>Мягмар</th>
                            <th>Лхагва</th>
                            <th>Пүрэв</th>
                            <th>Баасан</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleTableBody"></tbody>
                </table>
                <button class="save-schedule teacher-only" onclick="saveSchedule()" style="margin-top:20px; padding:12px 30px; background:#48bb78; color:white; border:none; border-radius:10px; cursor:pointer; display:none;">💾 Хуваарийг Хадгалах</button>
            </div>
            
            <div id="managePanel" class="panel">
                <div class="student-list">
                    <h3>👥 Бүртгэлтэй Суралцагчид</h3>
                    <div id="studentList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let users = JSON.parse(localStorage.getItem('users')) || [
            { id: 1, username: "bilguudei", password: "123", role: "student", name: "Билгүүдэй", lastName: "Батнаран", code: "2024001" },
            { id: 2, username: "baatarhuu", password: "123", role: "student", name: "Баатархүү", lastName: "Нансалмаа", code: "2024002" },
            { id: 3, username: "egshiglen", password: "123", role: "student", name: "Эгшиглэн", lastName: "Болормаа", code: "2024003" },
            { id: 4, username: "otgonbaatar", password: "123", role: "student", name: "Отгонбаатар", lastName: "Бат-Эрдэнэ", code: "2024004" },
            { id: 5, username: "amarjargal", password: "123", role: "student", name: "Амаржаргал", lastName: "Чинбат", code: "2024005" },
            { id: 6, username: "altanshagai", password: "123", role: "student", name: "Алтаншагай", lastName: "Сувд-Эрдэнэ", code: "2024006" },
            { id: 7, username: "erkhembayasgal", password: "123", role: "student", name: "Эрхэмбаясал", lastName: "Золбоо", code: "2024007" },
            { id: 8, username: "duurenbileg", password: "123", role: "student", name: "Дүүрэнбилэг", lastName: "Лхгавадорж", code: "2024008" },
            { id: 9, username: "bilguun", password: "123", role: "student", name: "Билгүүн", lastName: "Амартүвшин", code: "2024009" },
            { id: 10, username: "teacher", password: "teacher123", role: "teacher", name: "Багш", lastName: "", code: "T001" }
        ];
        
        let attendance = JSON.parse(localStorage.getItem('attendance')) || {};
        let notes = JSON.parse(localStorage.getItem('notes')) || {};
        let schedules = JSON.parse(localStorage.getItem('schedules')) || {};
        let currentUser = null;
        let currentWeek = 1;

        const timeSlots = ["09:00-10:30", "10:40-12:10", "12:20-13:50", "14:00-15:30", "15:40-17:10"];
        const days = ["monday", "tuesday", "wednesday", "thursday", "friday"];
        const mongolianDays = ["Даваа", "Мягмар", "Лхагва", "Пүрэв", "Баасан"];

        // Save data
        function saveData() {
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('attendance', JSON.stringify(attendance));
            localStorage.setItem('notes', JSON.stringify(notes));
            localStorage.setItem('schedules', JSON.stringify(schedules));
        }

        // Login
        function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const role = document.getElementById('loginRole').value;
            
            const user = users.find(u => u.username === username && u.password === password && u.role === role);
            
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showMainApp();
            } else {
                alert('Нэвтрэх нэр эсвэл нууц үг буруу байна!');
            }
        }

        // Register
        function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value;
            const lastName = document.getElementById('regLastName').value;
            const role = document.getElementById('regRole').value;
            
            if (!username || !password || !name) {
                alert('Бүх талбарыг бөглөнө үү!');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('Энэ хэрэглэгчийн нэр бүртгэлтэй байна!');
                return;
            }
            
            const newUser = {
                id: users.length + 1,
                username: username,
                password: password,
                role: role,
                name: name,
                lastName: lastName || '',
                code: `2024${String(users.length + 1).padStart(3, '0')}`
            };
            
            users.push(newUser);
            notes[newUser.id] = [];
            saveData();
            
            alert('Амжилттай бүртгүүллээ! Одоо нэвтэрнэ үү.');
            toggleAuth();
        }

        function toggleAuth() {
            const authCard = document.querySelector('.auth-card');
            const title = document.getElementById('authTitle');
            
            if (title.innerText === 'Нэвтрэх') {
                authCard.innerHTML = `
                    <h2>Бүртгүүлэх</h2>
                    <input type="text" id="regUsername" placeholder="Хэрэглэгчийн нэр">
                    <input type="password" id="regPassword" placeholder="Нууц үг">
                    <input type="text" id="regName" placeholder="Нэр">
                    <input type="text" id="regLastName" placeholder="Овог">
                    <select id="regRole">
                        <option value="student">Суралцагч</option>
                        <option value="teacher">Багш</option>
                    </select>
                    <button onclick="register()">Бүртгүүлэх</button>
                    <div class="toggle-auth" onclick="toggleAuth()">Нэвтрэх</div>
                `;
            } else {
                authCard.innerHTML = `
                    <h2>Нэвтрэх</h2>
                    <input type="text" id="loginUsername" placeholder="Хэрэглэгчийн нэр">
                    <input type="password" id="loginPassword" placeholder="Нууц үг">
                    <select id="loginRole">
                        <option value="student">Суралцагч</option>
                        <option value="teacher">Багш</option>
                    </select>
                    <button onclick="login()">Нэвтрэх</button>
                    <div class="toggle-auth" onclick="toggleAuth()">Бүртгүүлэх</div>
                `;
            }
        }

        // Show main app
        function showMainApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('userNameDisplay').innerHTML = `<strong>${currentUser.name} ${currentUser.lastName}</strong>`;
            
            // Set today's date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('attendanceDate').value = today;
            
            if (!notes[currentUser.id]) {
                notes[currentUser.id] = [];
                saveData();
            }
            
            // Show/hide teacher elements
            const teacherElements = document.querySelectorAll('.teacher-only');
            if (currentUser.role === 'teacher') {
                teacherElements.forEach(el => el.style.display = 'block');
                document.querySelector('.save-schedule').style.display = 'block';
            } else {
                teacherElements.forEach(el => el.style.display = 'none');
                document.querySelector('.save-schedule').style.display = 'none';
            }
            
            loadAttendance();
            loadNotes();
            setupWeekSelector();
            renderScheduleTable();
            if (currentUser.role === 'teacher') {
                loadStudentList();
            }
            
            // Setup navigation
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.getAttribute('data-tab');
                    document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
                    document.getElementById(`${tabId}Panel`).classList.add('active');
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    if (tabId === 'schedule') {
                        renderScheduleTable();
                    }
                });
            });
        }

        // Load attendance
        function loadAttendance() {
            const date = document.getElementById('attendanceDate').value;
            const students = users.filter(u => u.role === 'student');
            const tbody = document.getElementById('attendanceTableBody');
            
            if (!attendance[date]) {
                attendance[date] = {};
                students.forEach(student => {
                    attendance[date][student.id] = 'present';
                });
                saveData();
            }
            
            let presentCount = 0, absentCount = 0, lateCount = 0;
            
            tbody.innerHTML = '';
            students.forEach((student, index) => {
                const status = attendance[date][student.id] || 'present';
                if (status === 'present') presentCount++;
                else if (status === 'absent') absentCount++;
                else if (status === 'late') lateCount++;
                
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = index + 1;
                row.insertCell(1).innerHTML = student.lastName;
                row.insertCell(2).innerHTML = student.name;
                row.insertCell(3).innerHTML = student.code;
                
                const statusCell = row.insertCell(4);
                const statusClass = status === 'present' ? 'status-present' : (status === 'absent' ? 'status-absent' : 'status-late');
                const statusText = status === 'present' ? '✅ Ирсэн' : (status === 'absent' ? '❌ Ирээгүй' : '⏰ Хоцорсон');
                statusCell.innerHTML = `<span class="status-badge ${statusClass}">${statusText}</span>`;
                
                const actionCell = row.insertCell(5);
                if (currentUser.role === 'teacher') {
                    actionCell.innerHTML = `
                        <button class="status-btn status-present" onclick="updateAttendance('${date}', ${student.id}, 'present')">Ирсэн</button>
                        <button class="status-btn status-absent" onclick="updateAttendance('${date}', ${student.id}, 'absent')">Ирээгүй</button>
                        <button class="status-btn status-late" onclick="updateAttendance('${date}', ${student.id}, 'late')">Хоцорсон</button>
                    `;
                } else {
                    actionCell.innerHTML = '-';
                }
            });
            
            const total = students.length;
            document.getElementById('totalStudents').innerHTML = total;
            document.getElementById('presentCount').innerHTML = presentCount;
            document.getElementById('absentCount').innerHTML = absentCount;
            document.getElementById('lateCount').innerHTML = lateCount;
            document.getElementById('attendanceRate').innerHTML = `${((presentCount + lateCount) / total * 100).toFixed(1)}%`;
        }

        // Update attendance
        function updateAttendance(date, studentId, status) {
            if (!attendance[date]) {
                attendance[date] = {};
            }
            attendance[date][studentId] = status;
            saveData();
            loadAttendance();
            showNotification('Ирцийн мэдээлэл шинэчлэгдлэ!');
        }

        // Load notes
        function loadNotes() {
            const userNotes = notes[currentUser.id] || [];
            const notesListDiv = document.getElementById('notesList');
            notesListDiv.innerHTML = '';
            
            [...userNotes].reverse().forEach((note, idx) => {
                const originalIdx = userNotes.length - 1 - idx;
                const noteDiv = document.createElement('div');
                noteDiv.className = 'note-item';
                noteDiv.innerHTML = `
                    <button class="delete-note" onclick="deleteNote(${originalIdx})" style="float:right; background:#f56565; color:white; border:none; padding:5px 12px; border-radius:8px; cursor:pointer;">🗑</button>
                    <div class="note-title" style="font-weight:bold; font-size:1.1em;">${escapeHtml(note.title)}</div>
                    <div class="note-content" style="margin:10px 0;">${escapeHtml(note.content)}</div>
                    <div class="note-date" style="font-size:0.85em; color:#999;">${note.date}</div>
                `;
                notesListDiv.appendChild(noteDiv);
            });
        }

        // Add note
        function addNote() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            
            if (!title || !content) {
                alert('Гарчиг болон агуулгыг бөглөнө үү!');
                return;
            }
            
            notes[currentUser.id].push({
                title: title,
                content: content,
                date: new Date().toLocaleString('mn-MN')
            });
            saveData();
            loadNotes();
            
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            showNotification('Тэмдэглэл нэмэгдлэ!');
        }

        // Delete note
        function deleteNote(index) {
            notes[currentUser.id].splice(index, 1);
            saveData();
            loadNotes();
            showNotification('Тэмдэглэл устгагдла!');
        }

        // Setup week selector
        function setupWeekSelector() {
            const weekSelector = document.getElementById('weekSelector');
            weekSelector.innerHTML = '';
            
            for (let i = 1; i <= 16; i++) {
                const btn = document.createElement('button');
                btn.className = 'week-btn' + (i === currentWeek ? ' active' : '');
                btn.innerText = `${i}-р долоо хоног`;
                btn.onclick = () => {
                    currentWeek = i;
                    document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderScheduleTable();
                };
                weekSelector.appendChild(btn);
            }
        }

        // Render schedule table
        function renderScheduleTable() {
            const tbody = document.getElementById('scheduleTableBody');
            tbody.innerHTML = '';
            
            if (!schedules[currentWeek]) {
                schedules[currentWeek] = {};
                for (let day of days) {
                    schedules[currentWeek][day] = {};
                    for (let slot of timeSlots) {
                        schedules[currentWeek][day][slot] = '';
                    }
                }
                saveData();
            }
            
            for (let slot of timeSlots) {
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = slot;
                
                for (let i = 0; i < days.length; i++) {
                    const cell = row.insertCell();
                    const value = schedules[currentWeek][days[i]][slot] || '';
                    
                    if (currentUser.role === 'teacher') {
                        const textarea = document.createElement('textarea');
                        textarea.value = value;
                        textarea.rows = 2;
                        textarea.onchange = ((day, s) => (e) => {
                            schedules[currentWeek][day][s] = e.target.value;
                            saveData();
                        })(days[i], slot);
                        cell.appendChild(textarea);
                    } else {
                        cell.innerHTML = value || '-';
                    }
                }
            }
        }

        // Save schedule
        function saveSchedule() {
            saveData();
            showNotification('Хуваарь хадгалагдла!');
        }

        // Load student list for teacher
        function loadStudentList() {
            const students = users.filter(u => u.role === 'student');
            const studentListDiv = document.getElementById('studentList');
            studentListDiv.innerHTML = '';
            
            students.forEach(student => {
                const studentDiv = document.createElement('div');
                studentDiv.className = 'student-item';
                studentDiv.innerHTML = `
                    <div>
                        <strong>${student.lastName} ${student.name}</strong><br>
                        <small>Хэрэглэгч: ${student.username} | Код: ${student.code}</small>
                    </div>
                    <div>
                        <button onclick="viewStudentStats(${student.id})" style="padding:8px 15px; background:#667eea; color:white; border:none; border-radius:8px; cursor:pointer;">📊 Статистик</button>
                        <button onclick="viewStudentNotes(${student.id})" style="padding:8px 15px; background:#48bb78; color:white; border:none; border-radius:8px; cursor:pointer;">📝 Тэмдэглэл</button>
                    </div>
                `;
                studentListDiv.appendChild(studentDiv);
            });
        }

        // View student stats
        function viewStudentStats(studentId) {
            let present = 0, absent = 0, late = 0, total = 0;
            
            for (let date in attendance) {
                if (attendance[date][studentId]) {
                    const status = attendance[date][studentId];
                    if (status === 'present') present++;
                    else if (status === 'absent') absent++;
                    else if (status === 'late') late++;
                    total++;
                }
            }
            
            const modalHtml = `
                <div id="statsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; justify-content:center; align-items:center;">
                    <div style="background:white; border-radius:20px; padding:30px; max-width:400px; width:90%;">
                        <h3>📊 Ирцийн статистик</h3>
                        <div style="margin:20px 0;">
                            <p><strong>✅ Ирсэн:</strong> ${present} удаа</p>
                            <p><strong>❌ Ирээгүй:</strong> ${absent} удаа</p>
                            <p><strong>⏰ Хоцорсон:</strong> ${late} удаа</p>
                            <p><strong>📅 Нийт хичээлийн өдөр:</strong> ${total}</p>
                            <p><strong>📈 Ирцийн хувь:</strong> ${total > 0 ? ((present + late) / total * 100).toFixed(1) : 0}%</p>
                        </div>
                        <button onclick="document.getElementById('statsModal').remove()" style="width:100%; padding:12px; background:#667eea; color:white; border:none; border-radius:10px;">Хаах</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        // View student notes
        function viewStudentNotes(studentId) {
            const studentNotes = notes[studentId] || [];
            const modalHtml = `
                <div id="notesModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; justify-content:center; align-items:center;">
                    <div style="background:white; border-radius:20px; padding:30px; max-width:600px; width:90%; max-height:80%; overflow-y:auto;">
                        <h3>📝 Суралцагчийн тэмдэглэлүүд</h3>
                        <div id="modalNotesList"></div>
                        <button onclick="document.getElementById('notesModal').remove()" style="margin-top:20px; width:100%; padding:12px; background:#667eea; color:white; border:none; border-radius:10px;">Хаах</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            const modalNotesDiv = document.getElementById('modalNotesList');
            modalNotesDiv.innerHTML = '';
            
            if (studentNotes.length === 0) {
                modalNotesDiv.innerHTML = '<p style="text-align:center; color:#999;">Тэмдэглэл байхгүй байна.</p>';
            } else {
                [...studentNotes].reverse().forEach(note => {
                    const noteDiv = document.createElement('div');
                    noteDiv.className = 'note-item';
                    noteDiv.innerHTML = `
                        <div class="note-title" style="font-weight:bold;">${escapeHtml(note.title)}</div>
                        <div class="note-content" style="margin:10px 0;">${escapeHtml(note.content)}</div>
                        <div class="note-date" style="font-size:0.85em; color:#999;">${note.date}</div>
                    `;
                    modalNotesDiv.appendChild(noteDiv);
                });
            }
        }

        // Logout
        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        }

        // Helper functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.position = 'fixed';
            notification.style.bottom = '20px';
            notification.style.right = '20px';
            notification.style.padding = '12px 20px';
            notification.style.background = '#48bb78';
            notification.style.color = 'white';
            notification.style.borderRadius = '10px';
            notification.style.zIndex = '1001';
            notification.style.animation = 'fadeIn 0.3s ease-out';
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        // Check session
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showMainApp();
        }
        
        // Initialize schedule
        if (!schedules[1]) {
            schedules[1] = {};
            for (let day of days) {
                schedules[1][day] = {};
                for (let slot of timeSlots) {
                    schedules[1][day][slot] = '';
                }
            }
            saveData();
        }
    </script>
</body>
</html>
